name: Docs Build
# This workflow compiles the LaTeX documents in the docs directory whenever changes 
#are pushed to the main branch or when a pull request is opened targeting the main branch
#but only if the changes affect files in the docs directory or this workflow file itself.
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-build.yml"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "docs/**"
      - ".github/workflows/docs-build.yml"
permissions:
  contents: write
  
jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile report LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: report.tex
          working_directory: docs/LaTeX
      
      - name: Move compiled PDF into docs
        run: |
          mv docs/LaTeX/report.pdf docs/report.pdf

      - name: Create pull request with updated PDF
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update compiled PDF documents"
          branch: docs/update-pdf-${{ github.sha }}
          title: "Update compiled PDF documents"
          body: "Automated update of compiled PDF generated by LaTeX action."
          labels: docs