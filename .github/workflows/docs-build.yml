name: Docs Build
# Compiles the LaTeX report when a PR targets main and edits docs/LaTeX or this file.
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "docs/LaTeX/**"
      - ".github/workflows/docs-build.yml"

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Compile report LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: report.tex
          working_directory: docs/LaTeX

      - name: Install preview generation dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Update PDF and preview
        run: |
          mkdir -p docs/media
          cp docs/LaTeX/report.pdf docs/report.pdf
          pdftoppm -png -singlefile -f 1 docs/LaTeX/report.pdf docs/media/report-preview

      - name: Commit generated PDF and preview
        run: |
          git config user.name "[GitHub Actions]LaTeX Builder Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/report.pdf docs/media/report-preview.png
          if git diff --cached --quiet; then
            echo "No generated file changes to commit"
            exit 0
          fi
          git commit -m "docs: update generated PDF and preview [skip ci]"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}" || echo "Push failed (likely fork PR permissions or branch protections)."
